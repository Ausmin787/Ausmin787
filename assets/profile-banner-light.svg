<svg viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ausmin Deb - Neural Analytics Profile Banner Light</title>
  <desc id="desc">Animated light neural-network banner for Ausmin Deb's data analytics portfolio.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEF6FF"/>
      <stop offset="0.48" stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#F3F0FF"/>
    </linearGradient>

    <linearGradient id="edgeBlue" x1="120" y1="0" x2="1060" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0284C7" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#7C3AED" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="edgeHot" x1="120" y1="320" x2="1080" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891B2" stop-opacity="0.16"/>
      <stop offset="0.48" stop-color="#A855F7" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="nameGradient" x1="430" y1="0" x2="770" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <pattern id="microGrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0 L0 0 0 36" stroke="#1D4ED8" stroke-opacity="0.055" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#475569" fill-opacity="0.10"/>
    </pattern>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" values="0 0 0 0 0.20  0 0 0 0 0.42  0 0 0 0 0.90  0 0 0 0.40 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glassShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#64748B" flood-opacity="0.24"/>
    </filter>
  </defs>

  <style>
    .edge { stroke-dasharray: 9 16; animation: flow 9s linear infinite; }
    .edgeSlow { stroke-dasharray: 5 20; animation: flow 13s linear infinite reverse; }
    .edgePulse { animation: edgePulse 4.8s ease-in-out infinite; }
    .node { transform-box: fill-box; transform-origin: center; animation: nodePulse 4.2s ease-in-out infinite; }
    .node2 { animation-delay: .7s; }
    .node3 { animation-delay: 1.4s; }
    .node4 { animation-delay: 2.1s; }
    .halo { transform-box: fill-box; transform-origin: center; animation: haloPulse 3.8s ease-out infinite; }
    .halo2 { animation-delay: 1.1s; }
    .halo3 { animation-delay: 2.2s; }
    .scan { animation: scanMove 6s ease-in-out infinite; }
    @keyframes flow { to { stroke-dashoffset: -220; } }
    @keyframes edgePulse { 0%,100% { opacity: .32; } 50% { opacity: .9; } }
    @keyframes nodePulse { 0%,100% { opacity: .62; transform: scale(1); } 50% { opacity: 1; transform: scale(1.22); } }
    @keyframes haloPulse { 0% { opacity: .36; transform: scale(.72); } 100% { opacity: 0; transform: scale(2.2); } }
    @keyframes scanMove { 0%,100% { transform: translateX(-180px); opacity: .10; } 50% { transform: translateX(180px); opacity: .18; } }
  </style>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#microGrid)"/>

  <g opacity="0.52">
    <path d="M0 82 H1200" stroke="#2563EB" stroke-opacity="0.06"/>
    <path d="M0 181 H1200" stroke="#2563EB" stroke-opacity="0.08"/>
    <path d="M0 278 H1200" stroke="#2563EB" stroke-opacity="0.06"/>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path class="edge edgePulse" d="M78 92 C170 50 245 70 320 126 S466 208 560 174 S748 74 860 106 S1018 210 1126 166" stroke="url(#edgeBlue)" stroke-width="2"/>
    <path class="edgeSlow edgePulse" d="M92 266 C190 198 250 236 340 188 S492 88 596 122 S760 260 868 214 S1034 96 1134 126" stroke="url(#edgeHot)" stroke-width="2"/>
    <path class="edge" d="M150 174 C242 106 330 106 426 150 S604 246 700 188 S858 88 1000 188" stroke="#0284C7" stroke-opacity="0.30" stroke-width="1.6"/>
    <path class="edgeSlow" d="M206 310 C320 258 410 282 512 228 S662 120 780 150 S944 258 1088 226" stroke="#7C3AED" stroke-opacity="0.32" stroke-width="1.6"/>
    <path class="edge" d="M196 54 C292 116 386 78 490 116 S668 230 778 186 S934 44 1038 74" stroke="#334155" stroke-opacity="0.16" stroke-width="1.4"/>
  </g>

  <g filter="url(#softGlow)">
    <circle class="halo" cx="188" cy="88" r="10" stroke="#0284C7" stroke-width="2"/>
    <circle class="halo halo2" cx="342" cy="188" r="11" stroke="#7C3AED" stroke-width="2"/>
    <circle class="halo halo3" cx="870" cy="106" r="10" stroke="#2563EB" stroke-width="2"/>
    <circle class="halo halo2" cx="1008" cy="188" r="11" stroke="#A855F7" stroke-width="2"/>

    <circle class="node" cx="78" cy="92" r="4.5" fill="#0284C7"/>
    <circle class="node node2" cx="188" cy="88" r="7" fill="#1D4ED8"/>
    <circle class="node node3" cx="320" cy="126" r="5.5" fill="#7C3AED"/>
    <circle class="node node4" cx="342" cy="188" r="8" fill="#A855F7"/>
    <circle class="node" cx="560" cy="174" r="5" fill="#0284C7"/>
    <circle class="node node2" cx="596" cy="122" r="6" fill="#7C3AED"/>
    <circle class="node node3" cx="700" cy="188" r="5" fill="#2563EB"/>
    <circle class="node node4" cx="860" cy="106" r="7" fill="#1D4ED8"/>
    <circle class="node" cx="868" cy="214" r="5.5" fill="#7C3AED"/>
    <circle class="node node2" cx="1008" cy="188" r="8" fill="#A855F7"/>
    <circle class="node node3" cx="1126" cy="166" r="5" fill="#0284C7"/>
    <circle class="node node4" cx="1134" cy="126" r="4.5" fill="#2563EB"/>
  </g>

  <g opacity="0.50">
    <circle cx="238" cy="250" r="2.5" fill="#2563EB"/>
    <circle cx="274" cy="42" r="2" fill="#7C3AED"/>
    <circle cx="454" cy="70" r="2.3" fill="#0284C7"/>
    <circle cx="754" cy="54" r="2" fill="#A855F7"/>
    <circle cx="928" cy="302" r="2.5" fill="#2563EB"/>
    <circle cx="1054" cy="272" r="2" fill="#0284C7"/>
  </g>

  <g class="scan">
    <rect x="430" y="58" width="340" height="232" rx="34" fill="#2563EB" opacity="0.06"/>
  </g>

  <g filter="url(#glassShadow)">
    <rect x="366" y="84" width="468" height="190" rx="28" fill="#FFFFFF" fill-opacity="0.78" stroke="#2563EB" stroke-opacity="0.22"/>
    <rect x="382" y="100" width="436" height="158" rx="21" fill="#F8FAFC" fill-opacity="0.54" stroke="#FFFFFF" stroke-opacity="0.72"/>
    <text x="600" y="151" text-anchor="middle" fill="url(#nameGradient)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="44" font-weight="800">Ausmin Deb</text>
    <text x="600" y="190" text-anchor="middle" fill="#1D4ED8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="650">Aspiring Data Analyst</text>
    <text x="600" y="222" text-anchor="middle" fill="#475569" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16">Python | SQL | Excel | Power BI</text>
    <path d="M476 239 H724" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
    <path d="M526 249 H674" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.72"/>
  </g>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="12" fill="#64748B" opacity="0.78">
    <text x="96" y="326">churn signals</text>
    <text x="956" y="44">risk clusters</text>
    <text x="980" y="326">retail segments</text>
  </g>
</svg>
