<svg viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ausmin Deb — Data Analytics Profile</title>
  <desc id="desc">Animated dark dashboard banner for Ausmin Deb's data analytics portfolio.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05101E"/>
      <stop offset="0.5" stop-color="#091828"/>
      <stop offset="1" stop-color="#041410"/>
    </linearGradient>

    <radialGradient id="ab1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ab2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#84CC16" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#84CC16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ab3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0 L0 0 0 42" stroke="#90A4B8" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>

    <linearGradient id="acl" x1="90" y1="275" x2="1110" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <filter id="lg" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feColorMatrix in="b" values="0 0 0 0 0.13  0 0 0 0 0.83  0 0 0 0 0.93  0 0 0 0.5 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="ng" x1="108" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#F5C842"/>
    </linearGradient>

    <clipPath id="cc">
      <rect x="630" y="205" width="490" height="82" rx="18"/>
    </clipPath>
  </defs>

  <style>
    .tl { stroke-dasharray: 1500; stroke-dashoffset: 1500; animation: dl 2.5s ease-out 0.5s forwards; }
    @keyframes dl { to { stroke-dashoffset: 0; } }
    @keyframes cg { 0%,100%{opacity:.3} 50%{opacity:1} }
    .cb1 { animation: cg 3s ease-in-out infinite; }
    .cb2 { animation: cg 3s ease-in-out 1s infinite; }
    .cb3 { animation: cg 3s ease-in-out 2s infinite; }
  </style>

  <!-- Background -->
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>

  <!-- Aurora blobs -->
  <ellipse cx="180" cy="130" rx="320" ry="220" fill="url(#ab1)"/>
  <ellipse cx="640" cy="350" rx="300" ry="180" fill="url(#ab2)"/>
  <ellipse cx="1070" cy="85" rx="270" ry="200" fill="url(#ab3)"/>

  <!-- Line: static glow base -->
  <path d="M90 275 C190 205 260 224 345 176 C435 125 520 128 620 155 C724 184 780 112 875 96 C972 80 1048 118 1110 66"
    stroke="url(#acl)" stroke-width="10" stroke-opacity="0.18" stroke-linecap="round" filter="url(#lg)"/>
  <!-- Line: animated draw -->
  <path class="tl" d="M90 275 C190 205 260 224 345 176 C435 125 520 128 620 155 C724 184 780 112 875 96 C972 80 1048 118 1110 66"
    stroke="url(#acl)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Line: white shimmer -->
  <path d="M90 275 C190 205 260 224 345 176 C435 125 520 128 620 155 C724 184 780 112 875 96 C972 80 1048 118 1110 66"
    stroke="#ECFEFF" stroke-opacity="0.22" stroke-width="1" stroke-linecap="round"/>

  <!-- Identity card -->
  <rect x="76" y="66" width="468" height="190" rx="20" fill="#0B1423" fill-opacity="0.86" stroke="#38BDF8" stroke-opacity="0.25"/>
  <text x="108" y="113" fill="url(#ng)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="38" font-weight="700">Ausmin Deb</text>
  <text x="108" y="152" fill="#A7F3D0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="600">Aspiring Data Analyst</text>
  <text x="108" y="188" fill="#B9C8D8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">Python  |  SQL  |  Excel  |  Power BI</text>
  <rect x="108" y="215" width="196" height="2" fill="#22D3EE"/>
  <rect x="318" y="215" width="76" height="2" fill="#A3E635"/>
  <rect x="408" y="215" width="44" height="2" fill="#F59E0B"/>

  <!-- Stat card 1: 150K+ -->
  <rect x="628" y="70" width="146" height="92" rx="16" fill="#0D1827" fill-opacity="0.92"/>
  <rect x="628" y="70" width="146" height="92" rx="16" fill="none" stroke="#22D3EE" stroke-width="1.5" class="cb1"/>
  <text x="654" y="112" fill="#E6F6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="700">150K+</text>
  <text x="654" y="139" fill="#B9C8D8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14">loan records</text>

  <!-- Stat card 2: 725K -->
  <rect x="802" y="70" width="146" height="92" rx="16" fill="#0D1827" fill-opacity="0.92"/>
  <rect x="802" y="70" width="146" height="92" rx="16" fill="none" stroke="#A3E635" stroke-width="1.5" class="cb2"/>
  <text x="828" y="112" fill="#E6F6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="700">725K</text>
  <text x="828" y="139" fill="#B9C8D8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14">transactions</text>

  <!-- Stat card 3: 10K -->
  <rect x="976" y="70" width="146" height="92" rx="16" fill="#0D1827" fill-opacity="0.92"/>
  <rect x="976" y="70" width="146" height="92" rx="16" fill="none" stroke="#F59E0B" stroke-width="1.5" class="cb3"/>
  <text x="1002" y="112" fill="#E6F6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="700">10K</text>
  <text x="1002" y="139" fill="#B9C8D8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14">churn records</text>

  <!-- Mini chart: panel background + border (outside clip so border is always fully visible) -->
  <rect x="630" y="205" width="490" height="82" rx="18" fill="#0A1322" fill-opacity="0.70" stroke="#91A4B7" stroke-opacity="0.16"/>

  <!-- Chart contents clipped to panel bounds -->
  <g clip-path="url(#cc)">
    <path d="M664 253 L705 237 L748 248 L790 228 L835 242 L884 222 L935 234 L981 215 L1035 227 L1085 213"
      stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Pulse rings -->
    <circle cx="705" cy="237" r="4" fill="none" stroke="#A3E635" stroke-width="1.5">
      <animate attributeName="r" values="4;14;4" dur="2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="790" cy="228" r="4" fill="none" stroke="#A3E635" stroke-width="1.5">
      <animate attributeName="r" values="4;14;4" dur="2s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="884" cy="222" r="4" fill="none" stroke="#A3E635" stroke-width="1.5">
      <animate attributeName="r" values="4;14;4" dur="2s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="981" cy="215" r="4" fill="none" stroke="#A3E635" stroke-width="1.5">
      <animate attributeName="r" values="4;14;4" dur="2s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1085" cy="213" r="4" fill="none" stroke="#A3E635" stroke-width="1.5">
      <animate attributeName="r" values="4;14;4" dur="2s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" begin="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Solid dots -->
    <circle cx="705" cy="237" r="4" fill="#A3E635"/>
    <circle cx="790" cy="228" r="4" fill="#A3E635"/>
    <circle cx="884" cy="222" r="4" fill="#A3E635"/>
    <circle cx="981" cy="215" r="4" fill="#A3E635"/>
    <circle cx="1085" cy="213" r="4" fill="#A3E635"/>

    <!-- Bar stubs -->
    <rect x="664" y="268" width="42" height="7" rx="3" fill="#F59E0B" opacity="0.85"/>
    <rect x="724" y="268" width="68" height="7" rx="3" fill="#F59E0B" opacity="0.85"/>
    <rect x="810" y="268" width="52" height="7" rx="3" fill="#F59E0B" opacity="0.85"/>
    <rect x="880" y="268" width="86" height="7" rx="3" fill="#F59E0B" opacity="0.85"/>
    <rect x="984" y="268" width="104" height="7" rx="3" fill="#F59E0B" opacity="0.85"/>
  </g>
</svg>
