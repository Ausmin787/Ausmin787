<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ausmin Deb data analytics profile banner</title>
  <desc id="desc">A dark technical dashboard banner with data grid lines, chart panels, and portfolio metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#102036"/>
      <stop offset="1" stop-color="#071A16"/>
    </linearGradient>
    <linearGradient id="accent" x1="136" y1="72" x2="1060" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" stroke="#90A4B8" stroke-opacity="0.13" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <path d="M90 275 C190 205 260 224 345 176 C435 125 520 128 620 155 C724 184 780 112 875 96 C972 80 1048 118 1110 66" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M90 275 C190 205 260 224 345 176 C435 125 520 128 620 155 C724 184 780 112 875 96 C972 80 1048 118 1110 66" stroke="#ECFEFF" stroke-opacity="0.45" stroke-width="1.4" stroke-linecap="round"/>

  <g opacity="0.92">
    <rect x="76" y="66" width="468" height="190" rx="20" fill="#0B1423" fill-opacity="0.82" stroke="#38BDF8" stroke-opacity="0.32"/>
    <text x="108" y="113" fill="#E6F6FF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="38" font-weight="700">Ausmin Deb</text>
    <text x="108" y="152" fill="#A7F3D0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="600">Aspiring Data Analyst</text>
    <text x="108" y="188" fill="#B9C8D8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">Python  |  SQL  |  Excel  |  Power BI</text>
    <rect x="108" y="215" width="196" height="2" fill="#22D3EE"/>
    <rect x="318" y="215" width="76" height="2" fill="#A3E635"/>
    <rect x="408" y="215" width="44" height="2" fill="#F59E0B"/>
  </g>

  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <rect x="628" y="70" width="146" height="92" rx="16" fill="#111C2E" fill-opacity="0.9" stroke="#22D3EE" stroke-opacity="0.34"/>
    <text x="654" y="112" fill="#E6F6FF" font-size="28" font-weight="700">150K+</text>
    <text x="654" y="139" fill="#B9C8D8" font-size="14">loan records</text>

    <rect x="802" y="70" width="146" height="92" rx="16" fill="#111C2E" fill-opacity="0.9" stroke="#A3E635" stroke-opacity="0.34"/>
    <text x="828" y="112" fill="#E6F6FF" font-size="28" font-weight="700">725K</text>
    <text x="828" y="139" fill="#B9C8D8" font-size="14">transactions</text>

    <rect x="976" y="70" width="146" height="92" rx="16" fill="#111C2E" fill-opacity="0.9" stroke="#F59E0B" stroke-opacity="0.34"/>
    <text x="1002" y="112" fill="#E6F6FF" font-size="28" font-weight="700">10K</text>
    <text x="1002" y="139" fill="#B9C8D8" font-size="14">churn records</text>
  </g>

  <g opacity="0.86">
    <rect x="630" y="205" width="490" height="82" rx="18" fill="#0A1322" fill-opacity="0.72" stroke="#91A4B7" stroke-opacity="0.18"/>
    <path d="M664 253 L705 231 L748 244 L790 218 L835 235 L884 213 L935 226 L981 205 L1035 219 L1085 196" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#A3E635">
      <circle cx="705" cy="231" r="4"/>
      <circle cx="790" cy="218" r="4"/>
      <circle cx="884" cy="213" r="4"/>
      <circle cx="981" cy="205" r="4"/>
      <circle cx="1085" cy="196" r="4"/>
    </g>
    <g fill="#F59E0B" opacity="0.9">
      <rect x="664" y="266" width="42" height="8" rx="4"/>
      <rect x="724" y="266" width="68" height="8" rx="4"/>
      <rect x="810" y="266" width="52" height="8" rx="4"/>
      <rect x="880" y="266" width="86" height="8" rx="4"/>
      <rect x="984" y="266" width="104" height="8" rx="4"/>
    </g>
  </g>
</svg>
